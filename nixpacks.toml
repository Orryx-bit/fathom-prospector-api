[providers.python]
usePoetry = false

[phases.setup]
nixPkgs = ['python311', 'pip']
# System dependencies required by Playwright's headless Chromium
aptPkgs = ['libgobject-2.0-0', 'libdbus-glib-1-2', 'libgtk-3-0', 'libgbm-dev']

[phases.install]
cmds = [
  'pip install --upgrade pip',
  'pip install -r requirements.txt'
]

[phases.build]
cmds = ['echo "Build phase complete. Browser installation will happen at start."']

[start]
cmd = 'bash start.sh'

[variables]
# This variable is now primarily for reference, as start.sh explicitly exports it.
PLAYWRIGHT_BROWSERS_PATH = "/opt/playwright"
